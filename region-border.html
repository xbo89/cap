<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }
    .border {
      position: fixed;
      inset: 0;
      border: 3px solid rgba(239, 68, 68, 0.8);
      border-radius: 4px;
      pointer-events: none;
      /* Subtle pulsing animation */
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { border-color: rgba(239, 68, 68, 0.8); }
      50% { border-color: rgba(239, 68, 68, 0.4); }
    }
    /* Small "REC" indicator in top-left corner */
    .rec-badge {
      position: fixed;
      top: 6px;
      left: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0, 0, 0, 0.7);
      color: #ef4444;
      font: bold 10px -apple-system, sans-serif;
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
    }
    .rec-dot {
      width: 6px;
      height: 6px;
      background: #ef4444;
      border-radius: 50%;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="border"></div>
  <div class="rec-badge">
    <div class="rec-dot"></div>
    REC
  </div>
</body>
</html>
