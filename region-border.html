<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .border {
      position: fixed;
      /* Use outline instead of border — outline draws OUTSIDE the element
         so it won't overlap with the recording region */
      outline: 2px solid rgba(255, 255, 255, 0.9);
      outline-offset: 0px;
      border-radius: 2px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="border" id="border"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const rx = parseFloat(params.get('x') || '0');
    const ry = parseFloat(params.get('y') || '0');
    const rw = parseFloat(params.get('w') || '0');
    const rh = parseFloat(params.get('h') || '0');
    const mx = parseFloat(params.get('monitorX') || '0');
    const my = parseFloat(params.get('monitorY') || '0');

    const localX = rx - mx;
    const localY = ry - my;

    const winW = window.innerWidth;
    const winH = window.innerHeight;
    const hasRegion = localX < winW && localY < winH && (localX + rw) > 0 && (localY + rh) > 0;

    const overlay = document.getElementById('overlay');
    const border = document.getElementById('border');

    if (hasRegion && rw > 0 && rh > 0) {
      // Clip-path cutout matches region exactly
      overlay.style.clipPath = `polygon(
        0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%,
        ${localX}px ${localY}px,
        ${localX}px ${localY + rh}px,
        ${localX + rw}px ${localY + rh}px,
        ${localX + rw}px ${localY}px,
        ${localX}px ${localY}px
      )`;

      // Border element matches region exactly — outline draws outside
      border.style.left = localX + 'px';
      border.style.top = localY + 'px';
      border.style.width = rw + 'px';
      border.style.height = rh + 'px';
    } else {
      border.style.display = 'none';
    }
  </script>
</body>
</html>
